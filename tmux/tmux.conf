# --------------------------------------------------------------------------------------
# - Apply theme changes: tmux kill-server && rm -rf /tmp/tmux-*
# - Avoid overlap, disable the Mac shortcut to switch input
#   sources with Ctrl+Space in: `System settings > Keyboard Shortcuts > Input Sources`
# --------------------------------------------------------------------------------------

# Use zsh as default
set -g default-shell /bin/zsh
set -g default-command /bin/zsh

# xTerm
set -ga terminal-overrides ',xterm-kitty:RGB'
set -g default-terminal "xterm-kitty"
set-option -sa terminal-overrides ",xterm*:Tc"

# General
set -g set-clipboard on                    # Use system clipboard
set -g detach-on-destroy off               # Don't exit from tmux when closing a session
set -g escape-time 0                       # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000               # Increase history size (from 2,000)
set -g mouse on                            # Enable mouse support
set -g status-interval 3                   # Update the status bar every 3 seconds (default: 15 seconds)
set -g status-position top                 # macOS / darwin style
set -g allow-passthrough on                # Allow programs in the pane to bypass tmux (e.g. for image preview)
set -g base-index 1                        # Start indexing windows at 1 instead of 0
set -g renumber-windows on                 # Renumber all windows when any window is closed

# Support for some more sophisticated features. Disable them if they are causing problems!
set-option -s focus-events on
set-option -s extended-keys on

# Set prefix key
unbind C-b                                 # Unbind the default prefix key
set -g prefix C-Space                      # Set new prefix key to Ctrl+Space

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# FZF
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Copy/Paste
bind-key -T copy-mode-vi v send-keys -X begin-selection
unbind -T copy-mode-vi MouseDragEnd1Pane        # Don't exit copy mode when dragging with mouse

# Pane Movement with vim motions
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resizing - [alt array keys]
unbind Up
unbind Down
unbind Left
unbind Right
bind Up resize-pane -U 5
bind Down resize-pane -D 5
bind Left resize-pane -L 5
bind Right resize-pane -R 5

# Window splitting
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# B for back a window, N for next window. P still works
bind b previous-window

# Window switching - [shift + alt + vim keys]
bind -n M-H previous-window
bind -n M-L next-window

# Display Popups
bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind C-p display-popup -E "ipython"
bind C-f display-popup \
  -w 80% \
  -h 80% \
  -E 'rmpc'
bind C-r display-popup \
  -d "#{pane_current_path}" \
  -w 90% \
  -h 90% \
  -E "ranger"
bind C-z display-popup \
  -w 80% \
  -h 80% \
  -E 'nvim ~/.zshrc'
bind C-g display-popup -E "bash -i ~/.tmux/scripts/chat-popup.sh"
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"

# Key bindings
bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach
bind * list-clients
bind -n C-r source-file ~/.config/tmux/tmux.conf

# Tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # Enable navigating between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Automatically saves sessions every 15 minutes
set -g @plugin 'sainnhe/tmux-fzf'               # Integrate fzf with tmux
set -g @plugin 'wfxr/tmux-fzf-url'              # Open urls from browser quickly without mouse
set -g @plugin 'omerxx/catppuccin-tmux'         # Catppuccin theme

# Theme: borders
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta

# Catppuccin theme settings
set -g @catppuccin_window_left_separator " "
set -g @catppuccin_window_right_separator "  "
set -g @catppuccin_window_middle_separator "  "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
set -g @catppuccin_date_time_text "%H:%M"

# Initialize TMUX plugin manager
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'

# Restore key bindings
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "send-keys C-l"
bind -n C-r source-file ~/.config/tmux/tmux.config