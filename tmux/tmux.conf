# ------------------------------------------------------------------
#  xTerm Settings
# ------------------------------------------------------------------
set -s default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ------------------------------------------------------------------
#  Prefix Key
# ------------------------------------------------------------------
set -g prefix C-a                          # Set new prefix key to Ctrl+a
unbind C-b                                 # Unbind the default prefix key
bind-key C-a send-prefix

# ------------------------------------------------------------------
#  General Settings
# ------------------------------------------------------------------
set -g set-clipboard on                    # Use system clipboard
set -g detach-on-destroy off               # Don't exit from tmux when closing a session
set -g escape-time 0                       # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000               # Increase history size (from 2,000)
set -g mouse on                            # Enable mouse support
set -g status-interval 3                   # Update the status bar every 3 seconds (default: 15 seconds)
set -g status-position top                 # macOS / darwin style
set -g allow-passthrough on                # Allow programs in the pane to bypass tmux (e.g. for image preview)
set -g base-index 1                        # Start indexing windows at 1 instead of 0
set -g pane-base-index 1                   # Start indexing panes at 1 instead of 0
set -g renumber-windows on                 # Renumber all windows when any window is closed
set -sg escape-time 1000000                # Remove delay for exiting insert mode with ESC in Neovim
set -g default-terminal "${TERM}"
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
setw -g mode-keys vi

# ------------------------------------------------------------------
#  Copy & Paste - like VIM
# ------------------------------------------------------------------
set-window-option -g mode-keys vi          # Enable VIM movements
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane   # Don't exit copy mode when dragging with mouse

# ------------------------------------------------------------------
#  Key Bindings
# ------------------------------------------------------------------
bind ^D detach
bind * list-clients

# ------------------------------------------------------------------
#  Reload Source
# ------------------------------------------------------------------
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# ------------------------------------------------------------------
#  Window Splitting
# ------------------------------------------------------------------
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# ------------------------------------------------------------------
#  Pane resizing
# ------------------------------------------------------------------
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# ------------------------------------------------------------------
#  Display Popups
# ------------------------------------------------------------------
bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind C-z display-popup \
  -w 80% \
  -h 80% \
  -E 'nvim ~/.zshrc'
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"

# ------------------------------------------------------------------
#  Display Menu
# ------------------------------------------------------------------
bind d display-menu -T "#[align=centre]Dotfiles" -x C -y C \
  ".zshrc"            z  "display-popup -E 'nvim ~/.zshrc'" \
  ".tmux.conf"        t  "display-popup -E 'nvim ~/.tmux.conf'" \
  ".sketchybarrc"     s  "display-popup -d "~/.config/sketchybar" -E 'nvim ~/.config/sketchybar/sketchybarrc'" \
  "Exit"              q  ""

# ------------------------------------------------------------------
#  FZF Settings
# ------------------------------------------------------------------
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ------------------------------------------------------------------
# Plugins
# ------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'                   # Tpm plugin manager
set -g @plugin 'christoomey/vim-tmux-navigator'     # Enable navigating between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'        # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'        # Automatically saves sessions every 15 minutes
set -g @plugin 'sainnhe/tmux-fzf'                   # Integrate fzf with tmux
set -g @plugin 'wfxr/tmux-fzf-url'                  # Open urls from browser quickly without mouse
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'omerxx/catppuccin-tmux'

set -g @continuum-restorn 'on'
set -g @resurrect-strategy-nvim 'session'

# ------------------------------------------------------------------
#  FloatX
# ------------------------------------------------------------------
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# ------------------------------------------------------------------
#  SessionX
# ------------------------------------------------------------------
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '/Users/omerxx/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# ------------------------------------------------------------------
#  Catppuccin Theme Settings
# ------------------------------------------------------------------
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'