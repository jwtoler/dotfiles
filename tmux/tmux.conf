# ------------------------------------------------------------------
#  Options
# ------------------------------------------------------------------
set -sg terminal-overrides ",*:RGB"        # True color support
set -g escape-time 0                       # Disable delays on escape sequences
set -g mouse on                            # Enable mouse support
set -g renumber-windows on                 # Renumber all windows when any window is closed
set -g repeat-time 1000                    # Increase "prefix-free" window
set -g set-clipboard on                    # Use system clipboard
set -g detach-on-destroy off               # Don't exit from tmux when closing a session
set -g escape-time 0                       # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000               # Increase history size (from 2,000)
set -g allow-passthrough on                # Allow programs in the pane to bypass tmux (e.g. for image preview)

# ------------------------------------------------------------------
#  Options: indexes
# ------------------------------------------------------------------
set -g base-index 1                        # Start indexing windows at 1 instead of 0
set -g pane-base-index 1                   # Start indexing panes at 1 instead of 0

# ------------------------------------------------------------------
#  Prefix Key
# ------------------------------------------------------------------
unbind C-b                                 # Unbind the default prefix key
set -g prefix `                            # Set new prefix key to Ctrl+a
bind ` send-prefix

# ------------------------------------------------------------------
#  Reload Source
# ------------------------------------------------------------------
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# ------------------------------------------------------------------
#  Copy & Paste - like VIM
# ------------------------------------------------------------------
set-window-option -g mode-keys vi          # Enable VIM movements
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane   # Don't exit copy mode when dragging with mouse

# ------------------------------------------------------------------
#  Theme: borders
# ------------------------------------------------------------------
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta

# ------------------------------------------------------------------
#  Theme: status
# ------------------------------------------------------------------
set -g status-interval 3
set -g status-style bg=default,fg=black,bright
set -g status-left ""
set -g status-right "#[fg=black,bright]#S"

# ------------------------------------------------------------------
#  Theme: status (windows)
# ------------------------------------------------------------------
set -g window-status-format "●"
set -g window-status-current-format "●"
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta\#,nobold}"
set -g window-status-bell-style "fg=red,nobold"

# ------------------------------------------------------------------
#  Keybindings: resize (pane)
# ------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ------------------------------------------------------------------
#  Keybindings: disable repeat for arrows
# ------------------------------------------------------------------
bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R

# ------------------------------------------------------------------
#  Keybindings: split
# ------------------------------------------------------------------
bind h split-window -h
bind | split-window -h
bind v split-window -v
bind - split-window -v

# ------------------------------------------------------------------
#  Keybindings: windows
# ------------------------------------------------------------------
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# ------------------------------------------------------------------
#  Keybindings: other
# ------------------------------------------------------------------
bind * list-clients
bind f resize-pane -Z
bind q detach-client
bind e choose-window -Z

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-f resize-pane -Z

# ------------------------------------------------------------------
#  Display Popups
# ------------------------------------------------------------------
bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind C-z display-popup \
  -w 80% \
  -h 80% \
  -E 'nvim ~/.zshrc'
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"

# ------------------------------------------------------------------
#  Display Menu
# ------------------------------------------------------------------
bind d display-menu -T "#[align=centre]Dotfiles" -x C -y C \
  ".zshrc"            z  "display-popup -E 'nvim ~/.zshrc'" \
  ".tmux.conf"        t  "display-popup -E 'nvim ~/.tmux.conf'" \
  ".sketchybarrc"     s  "display-popup -d "~/.config/sketchybar" -E 'nvim ~/.config/sketchybar/sketchybarrc'" \
  "Exit"              q  ""

# ------------------------------------------------------------------
#  FZF
# ------------------------------------------------------------------
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ------------------------------------------------------------------
# Plugin: installs
# ------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'                   # Tpm plugin manager
set -g @plugin 'tmux-plugins/tmux-resurrect'        # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'        # Automatically saves sessions every 15 minutes
set -g @plugin 'sainnhe/tmux-fzf'                   # Integrate fzf with tmux
set -g @plugin 'wfxr/tmux-fzf-url'                  # Open urls from browser quickly without mouse
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-floax'
#set -g @plugin 'omerxx/catppuccin-tmux'

# ------------------------------------------------------------------
# Plugin: continuum
# ------------------------------------------------------------------
set -g @continuum-restore 'on'

# ------------------------------------------------------------------
# Plugin: resurrect
# ------------------------------------------------------------------
set -g @resurrect-strategy-nvim 'session'

# ------------------------------------------------------------------
# Plugin: floax
# ------------------------------------------------------------------
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'